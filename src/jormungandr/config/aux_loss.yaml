trainer:
  epochs: 1
  batch_size: 16
  seed: 42
  encoder_learning_rate: 1e-4
  decoder_learning_rate: 1e-5
  output_head_learning_rate: 1e-5
  optimizer: "AdamW"
  log_interval: 10
  loss:
    name: "giouloss" # Options: "giouloss", "ciouloss"
    class_cost: 1.0
    bbox_cost: 5.0
    giou_cost: 2.0  
    num_labels: 91
    eos_coefficient: 0.1
    auxiliary_loss: true
    bbox_loss_coefficient: 5.0
    giou_loss_coefficient: 2.0
    decoder_layers: 6

model:
  input_size: 224
  num_classes: 92
  encoder:
    encoder_type: "mamba"
    num_layers: 12
  decoder:
    freeze_decoder: false
    epoch_to_unfreeze_decoder: 0
    auxiliary_loss: true
    
